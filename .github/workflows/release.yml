name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: coursework.exe
            pyinstaller_args: "--onefile --windowed"
            icon_arg: "--icon assets/icon.ico"
          - os: macos-latest
            artifact_name: coursework.dmg
            pyinstaller_args: "--windowed"
            icon_arg: "--icon assets/icon.icns"
          - os: ubuntu-latest
            artifact_name: coursework
            pyinstaller_args: "--onefile --windowed"
            icon_arg: "--icon assets/icon.ico"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements/prod.txt

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller --onefile --windowed --name coursework --icon assets/icon.ico main.py

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pyinstaller --onefile --windowed --name coursework --icon assets/icon.ico main.py

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: pyinstaller --windowed --name coursework --icon assets/icon.icns main.py

      - name: Package DMG (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Coursework" \
            --window-size 800 400 \
            --app-drop-link 600 185 \
            --no-internet-enable \
            dist/coursework.dmg \
            "dist/coursework.app" || true
          if [ ! -f dist/coursework.dmg ]; then
            hdiutil create -volname "Coursework" -srcfolder dist/coursework.app \
              -ov -format UDZO dist/coursework.dmg
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}