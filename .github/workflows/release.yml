name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: coursework.exe
          - os: macos-latest
            artifact_name: coursework.dmg
          - os: ubuntu-latest
            artifact_name: coursework

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements/prod.txt

      - name: Increase pagefile (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $computersys = Get-WmiObject Win32_ComputerSystem -EnableAllPrivileges
          $computersys.AutomaticManagedPagefile = $false
          $computersys.Put()
          $pagefile = Get-WmiObject Win32_PageFileSetting
          $pagefile.InitialSize = 8192
          $pagefile.MaximumSize = 16384
          $pagefile.Put()

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          pyinstaller --onefile --windowed --name coursework --icon assets/icon.ico main.py

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --windowed --name coursework --icon assets/icon.ico main.py

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --windowed --name coursework --icon assets/icon.icns main.py

      - name: Package DMG (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Coursework" \
            --window-size 800 400 \
            --app-drop-link 600 185 \
            --no-internet-enable \
            dist/coursework.dmg \
            "dist/coursework.app" || true
          if [ ! -f dist/coursework.dmg ]; then
            hdiutil create -volname "Coursework" -srcfolder dist/coursework.app \
              -ov -format UDZO dist/coursework.dmg
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}